<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale — Logo Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <script type="module" src="/src/main.ts"></script>
    <style>
      body { padding: 2rem; }
      .row { display: flex; gap: 24px; flex-wrap: wrap; align-items: center; }
      .dark-row { display: flex; gap: 24px; flex-wrap: wrap; align-items: center; background: #1a1a1a; padding: 24px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h6 class="section-label">Default — Sizes</h6>
    <div class="row">
      <sc-logo size="l"></sc-logo>
      <sc-logo size="m"></sc-logo>
      <sc-logo size="s"></sc-logo>
    </div>

    <h6 class="section-label">Inverse — Sizes</h6>
    <div class="dark-row">
      <sc-logo size="l" logo-style="inverse"></sc-logo>
      <sc-logo size="m" logo-style="inverse"></sc-logo>
      <sc-logo size="s" logo-style="inverse"></sc-logo>
    </div>

    <h6 class="section-label">Mark only</h6>
    <div class="row">
      <sc-logo size="l" hide-text></sc-logo>
      <sc-logo size="m" hide-text></sc-logo>
      <sc-logo size="s" hide-text></sc-logo>
    </div>

    <h6 class="section-label">Mark only — Inverse</h6>
    <div class="dark-row">
      <sc-logo size="l" logo-style="inverse" hide-text></sc-logo>
      <sc-logo size="m" logo-style="inverse" hide-text></sc-logo>
      <sc-logo size="s" logo-style="inverse" hide-text></sc-logo>
    </div>
  </body>
</html>
