<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale — Badge Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <script type="module" src="/src/main.ts"></script>
    <style>
      body { padding: 2rem; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    </style>
  </head>
  <body>
    <h6 class="section-label">Status variants</h6>
    <div class="row">
      <sc-badge status="default">Default</sc-badge>
      <sc-badge status="info">Info</sc-badge>
      <sc-badge status="warning">Warning</sc-badge>
      <sc-badge status="negative">Negative</sc-badge>
      <sc-badge status="positive">Positive</sc-badge>
      <sc-badge status="mono">Mono</sc-badge>
      <sc-badge status="disabled">Disabled</sc-badge>
    </div>

    <h6 class="section-label">With icons</h6>
    <div class="row">
      <sc-badge status="default" icon="check">Default</sc-badge>
      <sc-badge status="info" icon="info">Info</sc-badge>
      <sc-badge status="warning" icon="alert-triangle">Warning</sc-badge>
      <sc-badge status="negative" icon="x-circle">Negative</sc-badge>
      <sc-badge status="positive" icon="check-circle">Positive</sc-badge>
      <sc-badge status="mono" icon="star">Mono</sc-badge>
    </div>

    <h6 class="section-label">Default hover / active</h6>
    <p class="m">Hover and click the default badge to see interaction states.</p>
    <div class="row">
      <sc-badge status="default">Hover me</sc-badge>
    </div>
  </body>
</html>
