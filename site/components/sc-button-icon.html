<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale — Button Icon Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <script type="module" src="/src/main.ts"></script>
    <style>
      body { padding: 2rem; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
      .dark-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; background: #1a1a1a; padding: 16px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h6 class="section-label">Primary</h6>
    <div class="row">
      <sc-button-icon size="l" type="primary" icon="check-circle" label="Confirm"></sc-button-icon>
      <sc-button-icon size="s" type="primary" icon="check-circle" label="Confirm"></sc-button-icon>
    </div>

    <h6 class="section-label">Secondary</h6>
    <div class="row">
      <sc-button-icon size="l" type="secondary" icon="settings" label="Settings"></sc-button-icon>
      <sc-button-icon size="s" type="secondary" icon="settings" label="Settings"></sc-button-icon>
    </div>

    <h6 class="section-label">Tertiary</h6>
    <div class="row">
      <sc-button-icon size="l" type="tertiary" icon="heart" label="Like"></sc-button-icon>
      <sc-button-icon size="s" type="tertiary" icon="heart" label="Like"></sc-button-icon>
    </div>

    <h6 class="section-label">Tertiary Mono</h6>
    <div class="row">
      <sc-button-icon size="l" type="tertiary-mono" icon="more-horizontal" label="More"></sc-button-icon>
      <sc-button-icon size="s" type="tertiary-mono" icon="more-horizontal" label="More"></sc-button-icon>
    </div>

    <h6 class="section-label">Inverse</h6>
    <div class="dark-row">
      <sc-button-icon size="l" type="inverse" icon="star" label="Favourite"></sc-button-icon>
      <sc-button-icon size="s" type="inverse" icon="star" label="Favourite"></sc-button-icon>
    </div>

    <h6 class="section-label">Mono</h6>
    <div class="row">
      <sc-button-icon size="l" type="mono" icon="x" label="Close"></sc-button-icon>
      <sc-button-icon size="s" type="mono" icon="x" label="Close"></sc-button-icon>
    </div>

    <h6 class="section-label">Outline</h6>
    <div class="row">
      <sc-button-icon size="l" type="outline" icon="plus" label="Add"></sc-button-icon>
      <sc-button-icon size="s" type="outline" icon="plus" label="Add"></sc-button-icon>
    </div>

    <h6 class="section-label">Outline Mono</h6>
    <div class="row">
      <sc-button-icon size="l" type="outline-mono" icon="edit-2" label="Edit"></sc-button-icon>
      <sc-button-icon size="s" type="outline-mono" icon="edit-2" label="Edit"></sc-button-icon>
    </div>

    <h6 class="section-label">Disabled</h6>
    <div class="row">
      <sc-button-icon size="l" type="primary" icon="check-circle" label="Confirm" disabled></sc-button-icon>
      <sc-button-icon size="l" type="outline" icon="plus" label="Add" disabled></sc-button-icon>
      <sc-button-icon size="s" type="secondary" icon="settings" label="Settings" disabled></sc-button-icon>
    </div>
  </body>
</html>
