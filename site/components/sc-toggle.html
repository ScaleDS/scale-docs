<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale — Toggle Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <script type="module" src="/src/main.ts"></script>
    <style>
      * { box-sizing: border-box; margin: 0; }
      html, body { height: 100%; }
      body {
        font-family: var(--sc-type-family-inter), system-ui, sans-serif;
        display: grid;
        grid-template-columns: 1fr 280px;
        height: 100vh;
        overflow: hidden;
      }

      /* ---- Canvas ---- */
      .canvas {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem;
        background: var(--sc-color-background-subtle);
        transition: background-color 200ms ease;
        height: 100vh;
      }

      /* ---- Sidebar ---- */
      .sidebar {
        border-left: 1px solid var(--sc-color-border-secondary);
        padding: 1.5rem;
        overflow-y: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        background: var(--sc-color-surface-l1);
      }
      .sidebar h1 {
        font-size: var(--sc-type-size-l);
        font-weight: var(--sc-type-weight-semi-bold);
        color: var(--sc-color-text-primary);
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .toggle-row label {
        font-size: var(--sc-type-size-m);
        font-weight: var(--sc-type-weight-regular);
        color: var(--sc-color-text-primary);
      }

      .theme-toggle {
        display: flex;
        gap: 4px;
        background: var(--sc-color-background-neutral);
        border-radius: 6px;
        padding: 2px;
      }
      .theme-toggle button {
        flex: 1;
        font-family: var(--sc-type-family-inter), system-ui, sans-serif;
        font-size: var(--sc-type-size-s);
        font-weight: var(--sc-type-weight-regular);
        padding: 4px 8px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        background: transparent;
        color: rgba(0, 0, 0, 0.45);
        transition: background 150ms ease, color 150ms ease;
      }
      [data-theme="dark"] .theme-toggle button {
        color: rgba(255, 255, 255, 0.45);
      }
      .theme-toggle button.active {
        background: var(--sc-color-background-primary);
        color: var(--sc-color-text-primary);
        box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      }

      .control {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .control > label {
        font-size: var(--sc-type-size-s);
        font-weight: var(--sc-type-weight-semi-bold);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--sc-color-text-tertiary);
      }
    </style>
  </head>
  <body>

    <!-- Canvas -->
    <div class="canvas" id="canvas">
      <sc-toggle id="preview"></sc-toggle>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <h1>Toggle</h1>

      <!-- Theme -->
      <div class="control">
        <label>Theme</label>
        <div class="theme-toggle" id="themeToggle">
          <button class="active" data-theme="light">Light</button>
          <button data-theme="dark">Dark</button>
        </div>
      </div>

      <sc-divider variant="subtle"></sc-divider>

      <!-- Checked -->
      <div class="toggle-row">
        <label>Checked</label>
        <sc-toggle id="checkedToggle"></sc-toggle>
      </div>

      <!-- Disabled -->
      <div class="toggle-row">
        <label>Disabled</label>
        <sc-toggle id="disabledToggle"></sc-toggle>
      </div>

    </div>

    <script>
      const preview = document.getElementById('preview')

      document.getElementById('checkedToggle').addEventListener('change', (e) => {
        preview.checked = e.detail.checked
      })

      document.getElementById('disabledToggle').addEventListener('change', (e) => {
        preview.disabled = e.detail.checked
      })

      // Keep sidebar toggle in sync when toggle is clicked directly on canvas
      preview.addEventListener('change', (e) => {
        document.getElementById('checkedToggle').checked = e.detail.checked
      })

      document.getElementById('themeToggle').addEventListener('click', (e) => {
        const btn = e.target.closest('button')
        if (!btn) return
        const theme = btn.dataset.theme
        document.documentElement.setAttribute('data-theme', theme)
        document.querySelectorAll('#themeToggle button').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
      })
    </script>
  </body>
</html>
