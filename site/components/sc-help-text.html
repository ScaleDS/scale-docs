<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale — Help Text Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <script type="module" src="/src/main.ts"></script>
    <style>
      * { box-sizing: border-box; }

      body {
        background: var(--sc-color-background-subtle);
        transition: background-color 200ms ease;
        min-height: 100vh;
        padding: 0;
        margin: 0;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--sc-space-l) var(--sc-space-2xl);
        border-bottom: 1px solid var(--sc-color-border-subtle);
        position: sticky;
        top: 0;
        background: var(--sc-color-background-primary);
        transition: background-color 200ms ease;
        z-index: 10;
      }

      .theme-toggle {
        display: flex;
        align-items: center;
        gap: var(--sc-space-s);
      }
      .theme-toggle span {
        font-family: var(--sc-type-family-inter), system-ui, sans-serif;
        font-size: var(--sc-type-size-s);
        font-weight: var(--sc-type-weight-semi-bold);
        color: var(--sc-color-text-primary);
      }
      label.toggle {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 22px;
        cursor: pointer;
      }
      label.toggle input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }
      .track {
        position: absolute;
        inset: 0;
        background: var(--sc-color-background-neutral);
        border-radius: 999px;
        transition: background 200ms ease;
      }
      label.toggle input:checked + .track { background: var(--sc-color-background-brand); }
      .thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 16px;
        height: 16px;
        background: white;
        border-radius: 50%;
        transition: transform 200ms ease;
        box-shadow: 0 1px 3px rgba(0,0,0,.2);
      }
      label.toggle input:checked ~ .track .thumb { transform: translateX(18px); }

      .content { padding: var(--sc-space-2xl); }

      /* Grid layout matching Figma: rows = statuses, cols = sizes */
      .preview-grid {
        display: grid;
        grid-template-columns: 100px repeat(3, 200px);
        gap: 0;
      }
      .grid-header {
        display: contents;
      }
      .grid-header div {
        font-family: var(--sc-type-family-inter), system-ui, sans-serif;
        font-size: var(--sc-type-size-s);
        font-weight: var(--sc-type-weight-semi-bold);
        color: var(--sc-color-text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: var(--sc-space-s) var(--sc-space-m);
        border-bottom: 1px solid var(--sc-color-border-subtle);
      }
      .grid-row {
        display: contents;
      }
      .grid-row > div {
        display: flex;
        align-items: flex-start;
        padding: var(--sc-space-l) var(--sc-space-m);
        border-bottom: 1px solid var(--sc-color-border-subtle);
      }
      .grid-row .row-label {
        font-family: var(--sc-type-family-inter), system-ui, sans-serif;
        font-size: var(--sc-type-size-s);
        font-weight: var(--sc-type-weight-semi-bold);
        color: var(--sc-color-text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding-top: 3px;
      }
    </style>
  </head>
  <body>

    <header class="header">
      <h1 style="font-family: var(--sc-type-family-inter), system-ui, sans-serif; font-size: var(--sc-type-size-l); font-weight: var(--sc-type-weight-semi-bold); color: var(--sc-color-text-primary); margin: 0;">Help Text</h1>
      <div class="theme-toggle">
        <span>Light</span>
        <label class="toggle">
          <input type="checkbox" id="theme-switch" />
          <span class="track"><span class="thumb"></span></span>
        </label>
        <span>Dark</span>
      </div>
    </header>

    <div class="content">

      <h6 class="section-label">Sizes &amp; Statuses</h6>

      <div class="preview-grid">
        <div class="grid-header">
          <div></div>
          <div>Large</div>
          <div>Medium</div>
          <div>Small</div>
        </div>

        <div class="grid-row">
          <div class="row-label">Default</div>
          <div><sc-help-text size="l" status="default" text="Help text"></sc-help-text></div>
          <div><sc-help-text size="m" status="default" text="Help text"></sc-help-text></div>
          <div><sc-help-text size="s" status="default" text="Help text"></sc-help-text></div>
        </div>

        <div class="grid-row">
          <div class="row-label">Info</div>
          <div><sc-help-text size="l" status="info" text="Help text"></sc-help-text></div>
          <div><sc-help-text size="m" status="info" text="Help text"></sc-help-text></div>
          <div><sc-help-text size="s" status="info" text="Help text"></sc-help-text></div>
        </div>

        <div class="grid-row">
          <div class="row-label">Warning</div>
          <div><sc-help-text size="l" status="warning" text="Help text"></sc-help-text></div>
          <div><sc-help-text size="m" status="warning" text="Help text"></sc-help-text></div>
          <div><sc-help-text size="s" status="warning" text="Help text"></sc-help-text></div>
        </div>

        <div class="grid-row">
          <div class="row-label">Negative</div>
          <div><sc-help-text size="l" status="negative" text="Help text"></sc-help-text></div>
          <div><sc-help-text size="m" status="negative" text="Help text"></sc-help-text></div>
          <div><sc-help-text size="s" status="negative" text="Help text"></sc-help-text></div>
        </div>

        <div class="grid-row">
          <div class="row-label">Positive</div>
          <div><sc-help-text size="l" status="positive" text="Help text"></sc-help-text></div>
          <div><sc-help-text size="m" status="positive" text="Help text"></sc-help-text></div>
          <div><sc-help-text size="s" status="positive" text="Help text"></sc-help-text></div>
        </div>

        <div class="grid-row">
          <div class="row-label">Disabled</div>
          <div><sc-help-text size="l" status="disabled" text="Help text"></sc-help-text></div>
          <div><sc-help-text size="m" status="disabled" text="Help text"></sc-help-text></div>
          <div><sc-help-text size="s" status="disabled" text="Help text"></sc-help-text></div>
        </div>

      </div>

      <h6 class="section-label">Multi-line</h6>
      <div style="display: flex; gap: var(--sc-space-2xl); flex-wrap: wrap;">
        <sc-help-text size="l" status="default" text="This is a longer help text that wraps across multiple lines to show how the component handles overflow content." style="max-width: 280px;"></sc-help-text>
        <sc-help-text size="l" status="info" text="This is a longer help text that wraps across multiple lines to show how the component handles overflow content." style="max-width: 280px;"></sc-help-text>
        <sc-help-text size="l" status="negative" text="This is a longer help text that wraps across multiple lines to show how the component handles overflow content." style="max-width: 280px;"></sc-help-text>
      </div>

    </div>

    <script>
      const toggle = document.getElementById('theme-switch')
      toggle.addEventListener('change', () => {
        document.documentElement.setAttribute('data-theme', toggle.checked ? 'dark' : 'light')
      })
    </script>
  </body>
</html>
