<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale — Input Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <script type="module" src="/src/main.ts"></script>
    <style>
      * { box-sizing: border-box; margin: 0; }
      html, body { height: 100%; }
      body {
        font-family: var(--sc-type-family-inter), system-ui, sans-serif;
        display: grid;
        grid-template-columns: 1fr 280px;
        height: 100vh;
        overflow: hidden;
      }

      /* ---- Canvas ---- */
      .canvas {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem;
        background: var(--sc-color-background-subtle);
        transition: background-color 200ms ease;
        height: 100vh;
        overflow-y: auto;
      }

      .canvas-inner {
        width: 100%;
        max-width: 400px;
      }

      /* ---- Sidebar ---- */
      .sidebar {
        border-left: 1px solid var(--sc-color-border-secondary);
        padding: 1.5rem;
        overflow-y: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        background: var(--sc-color-surface-l1);
      }
      .sidebar h1 {
        font-size: var(--sc-type-size-l);
        font-weight: var(--sc-type-weight-semi-bold);
        color: var(--sc-color-text-primary);
      }
      .control {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .control label {
        font-size: var(--sc-type-size-s);
        font-weight: var(--sc-type-weight-semi-bold);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--sc-color-text-tertiary);
      }
      .select-control {
        position: relative;
      }
      .select-control select {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        z-index: 1;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .toggle-row label {
        font-size: var(--sc-type-size-m);
        font-weight: var(--sc-type-weight-regular);
        color: var(--sc-color-text-primary);
        text-transform: none;
        letter-spacing: 0;
      }

      .theme-toggle {
        display: flex;
        gap: 4px;
        background: var(--sc-color-background-neutral);
        border-radius: 6px;
        padding: 2px;
      }
      .theme-toggle button {
        flex: 1;
        font-family: var(--sc-type-family-inter), system-ui, sans-serif;
        font-size: var(--sc-type-size-s);
        font-weight: var(--sc-type-weight-regular);
        padding: 4px 8px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        background: transparent;
        color: rgba(0, 0, 0, 0.45);
        transition: background 150ms ease, color 150ms ease;
      }
      [data-theme="dark"] .theme-toggle button {
        color: rgba(255, 255, 255, 0.45);
      }
      .theme-toggle button.active {
        background: var(--sc-color-background-primary);
        color: var(--sc-color-text-primary);
        box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      }
    </style>
  </head>
  <body>

    <!-- Canvas -->
    <div class="canvas" id="canvas">
      <div class="canvas-inner">
        <sc-input
          id="preview"
          label="Label"
          placeholder="Text"
          help-text="Help text"
        ></sc-input>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <h1>Input</h1>

      <!-- Theme -->
      <div class="control">
        <label>Theme</label>
        <div class="theme-toggle" id="themeToggle">
          <button class="active" data-theme="light">Light</button>
          <button data-theme="dark">Dark</button>
        </div>
      </div>

      <sc-divider variant="subtle"></sc-divider>

      <!-- Label -->
      <sc-input id="labelInput" label="Label" value="Label"></sc-input>

      <!-- Placeholder -->
      <sc-input id="placeholderInput" label="Placeholder" value="Text"></sc-input>

      <!-- Value -->
      <sc-input id="valueInput" label="Value" value=""></sc-input>

      <!-- State -->
      <div class="select-control">
        <sc-input class="select-input" id="stateDisplay" label="State" value="Default" trailing-icon="chevron-down"></sc-input>
        <select id="stateSelect">
          <option value="default" selected>Default</option>
          <option value="negative">Negative</option>
          <option value="positive">Positive</option>
          <option value="disabled">Disabled</option>
        </select>
      </div>

      <!-- Help Text -->
      <sc-input id="helpTextInput" label="Help Text" value="Help text"></sc-input>

      <!-- Leading Icon -->
      <div class="select-control">
        <sc-input class="select-input" id="leadingIconDisplay" label="Leading Icon" value="None" trailing-icon="chevron-down"></sc-input>
        <select id="leadingIconSelect">
          <option value="" selected>None</option>
          <option value="search">search</option>
          <option value="mail">mail</option>
          <option value="user">user</option>
          <option value="lock">lock</option>
          <option value="phone">phone</option>
          <option value="link">link</option>
          <option value="calendar">calendar</option>
          <option value="map-pin">map-pin</option>
          <option value="dollar-sign">dollar-sign</option>
          <option value="percent">percent</option>
        </select>
      </div>

      <!-- Trailing Icon -->
      <div class="select-control">
        <sc-input class="select-input" id="trailingIconDisplay" label="Trailing Icon" value="None" trailing-icon="chevron-down"></sc-input>
        <select id="trailingIconSelect">
          <option value="" selected>None</option>
          <option value="eye">eye</option>
          <option value="eye-off">eye-off</option>
          <option value="check">check</option>
          <option value="x">x</option>
          <option value="chevron-down">chevron-down</option>
          <option value="external-link">external-link</option>
          <option value="copy">copy</option>
          <option value="alert-circle">alert-circle</option>
        </select>
      </div>

      <sc-divider variant="subtle"></sc-divider>

      <!-- Show Label -->
      <div class="toggle-row">
        <label>Show Label</label>
        <sc-toggle id="showLabelToggle" checked></sc-toggle>
      </div>

      <!-- Show Help Text -->
      <div class="toggle-row">
        <label>Show Help Text</label>
        <sc-toggle id="showHelpTextToggle" checked></sc-toggle>
      </div>

    </div>

    <script>
      const preview = document.getElementById('preview')

      // Init sidebar inputs
      customElements.whenDefined('sc-input').then(() => {
        document.querySelectorAll('.sidebar sc-input').forEach(el => {
          el.showHelpText = false
        })
      })

      // Label
      document.getElementById('labelInput').addEventListener('input', (e) => {
        if (!e.detail) return
        preview.setAttribute('label', e.detail.value)
      })

      // Placeholder
      document.getElementById('placeholderInput').addEventListener('input', (e) => {
        if (!e.detail) return
        preview.setAttribute('placeholder', e.detail.value)
      })

      // Value
      document.getElementById('valueInput').addEventListener('input', (e) => {
        if (!e.detail) return
        preview.setAttribute('value', e.detail.value)
      })

      // State
      document.getElementById('stateSelect').addEventListener('change', (e) => {
        document.getElementById('stateDisplay').setAttribute('value', e.target.options[e.target.selectedIndex].text)
        preview.setAttribute('state', e.target.value)
      })

      // Help Text
      document.getElementById('helpTextInput').addEventListener('input', (e) => {
        if (!e.detail) return
        preview.setAttribute('help-text', e.detail.value)
      })

      // Leading Icon
      document.getElementById('leadingIconSelect').addEventListener('change', (e) => {
        document.getElementById('leadingIconDisplay').setAttribute('value', e.target.options[e.target.selectedIndex].text || 'None')
        if (e.target.value) {
          preview.setAttribute('leading-icon', e.target.value)
        } else {
          preview.removeAttribute('leading-icon')
        }
      })

      // Trailing Icon
      document.getElementById('trailingIconSelect').addEventListener('change', (e) => {
        document.getElementById('trailingIconDisplay').setAttribute('value', e.target.options[e.target.selectedIndex].text || 'None')
        if (e.target.value) {
          preview.setAttribute('trailing-icon', e.target.value)
        } else {
          preview.removeAttribute('trailing-icon')
        }
      })

      // Show Label
      document.getElementById('showLabelToggle').addEventListener('change', (e) => {
        preview.showLabel = e.detail.checked
      })

      // Show Help Text
      document.getElementById('showHelpTextToggle').addEventListener('change', (e) => {
        preview.showHelpText = e.detail.checked
      })

      // Theme toggle
      document.getElementById('themeToggle').addEventListener('click', (e) => {
        const btn = e.target.closest('button')
        if (!btn) return
        const theme = btn.dataset.theme
        document.documentElement.setAttribute('data-theme', theme)
        document.querySelectorAll('#themeToggle button').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
      })
    </script>
  </body>
</html>
