<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale — Foundations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <script type="module" src="/src/main.ts"></script>
    <style>
      * { box-sizing: border-box; }

      body {
        background: var(--sc-color-background-subtle);
        transition: background-color 200ms ease;
        min-height: 100vh;
        padding: 0;
        margin: 0;
      }

      /* ---- Header ---- */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--sc-space-l) var(--sc-space-2xl);
        border-bottom: 1px solid var(--sc-color-border-subtle);
        position: sticky;
        top: 0;
        background: var(--sc-color-background-primary);
        transition: background-color 200ms ease;
        z-index: 10;
      }

      /* ---- Theme toggle ---- */
      .theme-toggle {
        display: flex;
        align-items: center;
        gap: var(--sc-space-s);
      }
      .theme-toggle span {
        font-family: var(--sc-type-family-inter), system-ui, sans-serif;
        font-size: var(--sc-type-size-s);
        font-weight: var(--sc-type-weight-semi-bold);
        color: var(--sc-color-text-primary);
      }
      label.toggle {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 22px;
        cursor: pointer;
      }
      label.toggle input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }
      .track {
        position: absolute;
        inset: 0;
        background: var(--sc-color-background-neutral);
        border-radius: 999px;
        transition: background 200ms ease;
      }
      label.toggle input:checked + .track {
        background: var(--sc-color-background-brand);
      }
      .thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 16px;
        height: 16px;
        background: white;
        border-radius: 50%;
        transition: transform 200ms ease;
        box-shadow: 0 1px 3px rgba(0,0,0,.2);
      }
      label.toggle input:checked ~ .track .thumb {
        transform: translateX(18px);
      }

      /* ---- Content ---- */
      .content {
        padding: var(--sc-space-2xl);
        max-width: 960px;
      }

      /* ---- Logo section ---- */
      .logo-row {
        display: flex;
        align-items: center;
        gap: var(--sc-space-2xl);
        flex-wrap: wrap;
        padding: var(--sc-space-l) 0;
      }
      .logo-row.on-dark {
        background: var(--sc-color-background-inverse);
        padding: var(--sc-space-l) var(--sc-space-l);
        border-radius: var(--sc-border-radius-m);
      }

      /* ---- Icons section ---- */
      .icon-grid {
        display: grid;
        grid-template-columns: 120px repeat(3, 1fr);
        gap: 0;
      }
      .icon-grid-header {
        display: contents;
      }
      .icon-grid-header div {
        font-family: var(--sc-type-family-inter), system-ui, sans-serif;
        font-size: var(--sc-type-size-s);
        font-weight: var(--sc-type-weight-semi-bold);
        color: var(--sc-color-text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: var(--sc-space-s) var(--sc-space-m);
        border-bottom: 1px solid var(--sc-color-border-subtle);
      }
      .icon-row {
        display: contents;
      }
      .icon-row div {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--sc-space-l) var(--sc-space-m);
        border-bottom: 1px solid var(--sc-color-border-subtle);
      }
      .icon-row .label {
        justify-content: flex-start;
        font-family: var(--sc-type-family-inter), system-ui, sans-serif;
        font-size: var(--sc-type-size-m);
        font-weight: var(--sc-type-weight-semi-bold);
        color: var(--sc-color-text-primary);
      }
      .icon-row sc-status-icon {
        display: block;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>

    <header class="header">
      <sc-logo size="m"></sc-logo>
      <div class="theme-toggle">
        <span>Light</span>
        <label class="toggle">
          <input type="checkbox" id="theme-switch" />
          <span class="track">
            <span class="thumb"></span>
          </span>
        </label>
        <span>Dark</span>
      </div>
    </header>

    <div class="content">

      <!-- Logo -->
      <h6 class="section-label">Logo</h6>

      <p class="m">Default</p>
      <div class="logo-row">
        <sc-logo size="l"></sc-logo>
        <sc-logo size="m"></sc-logo>
        <sc-logo size="s"></sc-logo>
        <sc-logo size="l" hide-text></sc-logo>
        <sc-logo size="m" hide-text></sc-logo>
        <sc-logo size="s" hide-text></sc-logo>
      </div>

      <p class="m">Inverse</p>
      <div class="logo-row on-dark">
        <sc-logo size="l" logo-style="inverse"></sc-logo>
        <sc-logo size="m" logo-style="inverse"></sc-logo>
        <sc-logo size="s" logo-style="inverse"></sc-logo>
        <sc-logo size="l" logo-style="inverse" hide-text></sc-logo>
        <sc-logo size="m" logo-style="inverse" hide-text></sc-logo>
        <sc-logo size="s" logo-style="inverse" hide-text></sc-logo>
      </div>

      <!-- Status Icons -->
      <h6 class="section-label">Status Icons</h6>

      <div class="icon-grid">
        <div class="icon-grid-header">
          <div></div>
          <div>16px</div>
          <div>24px</div>
          <div>32px</div>
        </div>

        <!-- Info -->
        <div class="icon-row">
          <div class="label">Info</div>
          <div><sc-status-icon status="info" size="16"></sc-status-icon></div>
          <div><sc-status-icon status="info" size="24"></sc-status-icon></div>
          <div><sc-status-icon status="info" size="32"></sc-status-icon></div>
        </div>

        <!-- Warning -->
        <div class="icon-row">
          <div class="label">Warning</div>
          <div><sc-status-icon status="warning" size="16"></sc-status-icon></div>
          <div><sc-status-icon status="warning" size="24"></sc-status-icon></div>
          <div><sc-status-icon status="warning" size="32"></sc-status-icon></div>
        </div>

        <!-- Error -->
        <div class="icon-row">
          <div class="label">Error</div>
          <div><sc-status-icon status="error" size="16"></sc-status-icon></div>
          <div><sc-status-icon status="error" size="24"></sc-status-icon></div>
          <div><sc-status-icon status="error" size="32"></sc-status-icon></div>
        </div>

        <!-- Success -->
        <div class="icon-row">
          <div class="label">Success</div>
          <div><sc-status-icon status="success" size="16"></sc-status-icon></div>
          <div><sc-status-icon status="success" size="24"></sc-status-icon></div>
          <div><sc-status-icon status="success" size="32"></sc-status-icon></div>
        </div>

      </div><!-- /icon-grid -->

    </div><!-- /content -->

    <script>
      const toggle = document.getElementById('theme-switch')
      toggle.addEventListener('change', () => {
        document.documentElement.setAttribute('data-theme', toggle.checked ? 'dark' : 'light')
      })
    </script>
  </body>
</html>
