<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale — Row Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <script type="module" src="/src/main.ts"></script>
    <style>
      * { box-sizing: border-box; margin: 0; }
      html, body { height: 100%; }
      body {
        font-family: var(--sc-type-family-inter), system-ui, sans-serif;
        display: grid;
        grid-template-columns: 1fr 280px;
        height: 100vh;
        overflow: hidden;
      }

      /* ---- Canvas ---- */
      .canvas {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem;
        background: var(--sc-color-background-subtle);
        transition: background-color 200ms ease;
        height: 100vh;
      }

      .preview-wrap {
        width: 370px;
      }

      /* ---- Sidebar ---- */
      .sidebar {
        border-left: var(--sc-border-width-s) solid var(--sc-color-border-secondary);
        padding: 1.5rem;
        overflow-y: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        background: var(--sc-color-surface-l1);
      }
      .sidebar h1 {
        font-size: var(--sc-type-size-l);
        font-weight: var(--sc-type-weight-semi-bold);
        color: var(--sc-color-text-primary);
      }
      .control {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .control label {
        font-size: var(--sc-type-size-s);
        font-weight: var(--sc-type-weight-semi-bold);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--sc-color-text-tertiary);
      }
      .select-control {
        position: relative;
      }
      .select-control select {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        z-index: 1;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .toggle-row label {
        font-size: var(--sc-type-size-m);
        font-weight: var(--sc-type-weight-regular);
        color: var(--sc-color-text-primary);
        text-transform: none;
        letter-spacing: 0;
      }
      .theme-toggle {
        display: flex;
        gap: 4px;
        background: var(--sc-color-background-neutral);
        border-radius: 6px;
        padding: 2px;
      }
      .theme-toggle button {
        flex: 1;
        font-family: var(--sc-type-family-inter), system-ui, sans-serif;
        font-size: var(--sc-type-size-s);
        font-weight: var(--sc-type-weight-regular);
        padding: 4px 8px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        background: transparent;
        color: rgba(0, 0, 0, 0.45);
        transition: background 150ms ease, color 150ms ease;
      }
      [data-theme="dark"] .theme-toggle button {
        color: rgba(255, 255, 255, 0.45);
      }
      .theme-toggle button.active {
        background: var(--sc-color-background-primary);
        color: var(--sc-color-text-primary);
        box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      }

      /* ---- Variant grid ---- */
      .variant-grid {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      .variant-group .section-label {
        margin: 0 0 var(--sc-space-s);
      }
      .variant-list {
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>

    <!-- Canvas -->
    <div class="canvas">
      <div class="preview-wrap">
        <sc-row id="preview">Row label</sc-row>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <h1>Row</h1>

      <!-- Theme -->
      <div class="control">
        <label>Theme</label>
        <div class="theme-toggle" id="themeToggle">
          <button class="active" data-theme="light">Light</button>
          <button data-theme="dark">Dark</button>
        </div>
      </div>

      <sc-divider variant="subtle"></sc-divider>

      <!-- Label -->
      <sc-input id="labelInput" label="Label" value="Row label"></sc-input>

      <!-- Leading Icon -->
      <div class="select-control">
        <sc-input class="select-input" id="leadingIconDisplay" label="Leading Icon" value="None" trailing-icon="chevron-down"></sc-input>
        <select id="leadingIconSelect">
          <option value="" selected>None</option>
          <option value="home">home</option>
          <option value="user">user</option>
          <option value="settings">settings</option>
          <option value="star">star</option>
          <option value="heart">heart</option>
          <option value="bell">bell</option>
          <option value="search">search</option>
          <option value="mail">mail</option>
          <option value="file">file</option>
          <option value="folder">folder</option>
          <option value="calendar">calendar</option>
          <option value="clock">clock</option>
          <option value="lock">lock</option>
          <option value="plus">plus</option>
          <option value="check">check</option>
          <option value="x">x</option>
        </select>
      </div>

      <!-- Trailing Icon -->
      <div class="select-control">
        <sc-input class="select-input" id="trailingIconDisplay" label="Trailing Icon" value="None" trailing-icon="chevron-down"></sc-input>
        <select id="trailingIconSelect">
          <option value="" selected>None</option>
          <option value="chevron-right">chevron-right</option>
          <option value="chevron-down">chevron-down</option>
          <option value="arrow-right">arrow-right</option>
          <option value="external-link">external-link</option>
          <option value="edit-2">edit-2</option>
          <option value="trash-2">trash-2</option>
          <option value="more-horizontal">more-horizontal</option>
          <option value="check">check</option>
          <option value="x">x</option>
          <option value="plus">plus</option>
        </select>
      </div>

      <sc-divider variant="subtle"></sc-divider>

      <!-- Hide Divider -->
      <div class="toggle-row">
        <label>Hide Divider</label>
        <sc-toggle id="dividerToggle"></sc-toggle>
      </div>

      <!-- Disabled -->
      <div class="toggle-row">
        <label>Disabled</label>
        <sc-toggle id="disabledToggle"></sc-toggle>
      </div>

      <sc-divider variant="subtle"></sc-divider>

      <!-- All Variants -->
      <div class="variant-grid">
        <span class="label-s" style="color: var(--sc-color-text-tertiary); text-transform: uppercase; letter-spacing: 0.5px;">All variants</span>

        <div class="variant-group">
          <h6 class="section-label">Default</h6>
          <div class="variant-list">
            <sc-row>Inbox</sc-row>
            <sc-row>Sent</sc-row>
            <sc-row hide-divider>Drafts</sc-row>
          </div>
        </div>

        <div class="variant-group">
          <h6 class="section-label">With Leading Icon</h6>
          <div class="variant-list">
            <sc-row leading-icon="home">Home</sc-row>
            <sc-row leading-icon="user">Profile</sc-row>
            <sc-row leading-icon="settings" hide-divider>Settings</sc-row>
          </div>
        </div>

        <div class="variant-group">
          <h6 class="section-label">With Trailing Icon</h6>
          <div class="variant-list">
            <sc-row trailing-icon="chevron-right">Notifications</sc-row>
            <sc-row trailing-icon="chevron-right">Privacy</sc-row>
            <sc-row trailing-icon="chevron-right" hide-divider>Security</sc-row>
          </div>
        </div>

        <div class="variant-group">
          <h6 class="section-label">Leading + Trailing Icons</h6>
          <div class="variant-list">
            <sc-row leading-icon="bell" trailing-icon="chevron-right">Notifications</sc-row>
            <sc-row leading-icon="lock" trailing-icon="chevron-right">Security</sc-row>
            <sc-row leading-icon="mail" trailing-icon="chevron-right" hide-divider>Messages</sc-row>
          </div>
        </div>

        <div class="variant-group">
          <h6 class="section-label">Disabled</h6>
          <div class="variant-list">
            <sc-row leading-icon="lock" trailing-icon="chevron-right" disabled hide-divider>Locked</sc-row>
          </div>
        </div>
      </div>
    </div>

    <script>
      const preview = document.getElementById('preview')

      // Init sidebar inputs
      customElements.whenDefined('sc-input').then(() => {
        document.querySelectorAll('.sidebar sc-input').forEach(el => {
          el.showHelpText = false
        })
      })

      // Label
      document.getElementById('labelInput').addEventListener('input', (e) => {
        if (!e.detail) return
        preview.textContent = e.detail.value
      })

      // Leading Icon
      document.getElementById('leadingIconSelect').addEventListener('change', (e) => {
        document.getElementById('leadingIconDisplay').setAttribute('value', e.target.options[e.target.selectedIndex].text || 'None')
        if (e.target.value) {
          preview.setAttribute('leading-icon', e.target.value)
        } else {
          preview.removeAttribute('leading-icon')
        }
      })

      // Trailing Icon
      document.getElementById('trailingIconSelect').addEventListener('change', (e) => {
        document.getElementById('trailingIconDisplay').setAttribute('value', e.target.options[e.target.selectedIndex].text || 'None')
        if (e.target.value) {
          preview.setAttribute('trailing-icon', e.target.value)
        } else {
          preview.removeAttribute('trailing-icon')
        }
      })

      // Hide Divider
      document.getElementById('dividerToggle').addEventListener('change', (e) => {
        if (e.detail.checked) {
          preview.setAttribute('hide-divider', '')
        } else {
          preview.removeAttribute('hide-divider')
        }
      })

      // Disabled
      document.getElementById('disabledToggle').addEventListener('change', (e) => {
        if (e.detail.checked) {
          preview.setAttribute('disabled', '')
        } else {
          preview.removeAttribute('disabled')
        }
      })

      // Theme toggle
      document.getElementById('themeToggle').addEventListener('click', (e) => {
        const btn = e.target.closest('button')
        if (!btn) return
        const theme = btn.dataset.theme
        document.documentElement.setAttribute('data-theme', theme)
        document.querySelectorAll('#themeToggle button').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        window.dispatchEvent(new CustomEvent('theme-change', { detail: { theme } }))
      })
    </script>
  </body>
</html>
